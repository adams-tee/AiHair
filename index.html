<!DOCTYPE html>
<html>
<head>
  <title>AI Virtual Makeover</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; }
    /* Mirror the canvas so it feels like a real mirror */
    canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); } 
    video { display: none; }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="output_canvas"></canvas>

  <script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    let faceLandmarker;

    // Load Hair Image
    const hairImg = new Image();
    hairImg.src = 'pngwing.com.png'; 

    async function setup() {
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "GPU" 
            },
            outputFaceBlendshapes: true,
            runningMode: "VIDEO",
            numFaces: 1
        });
        startCamera();
    }
    
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then((stream) => {
            video.srcObject = stream;
            // Only start predicting once the video is actually streaming
            video.onloadedmetadata = () => {
                video.play();
                predict();
            };
        }).catch(err => {
            alert("Camera error: " + err);
        });
    }

    function predict() {
        // Guard against unready video or image
        if (video.readyState < 2 || !hairImg.complete || hairImg.naturalWidth === 0) { 
            requestAnimationFrame(predict);
            return;
        }

        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
        
        try {
            const startTimeMs = performance.now();
            const results = faceLandmarker.detectForVideo(video, startTimeMs);

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            if (results && results.faceLandmarks && results.faceLandmarks.length > 0) {
                for (const landmarks of results.faceLandmarks) {
                    drawMakeup(landmarks);
                    drawHair(landmarks);
                }
            }
            ctx.restore();
        } catch (error) {
            console.error("AI Error:", error);
        }

        requestAnimationFrame(predict);
    }

    function drawMakeup(landmarks) {
        const topLipIdx = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
        const botLipIdx = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291];

        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.beginPath();
        topLipIdx.forEach((idx, i) => {
            const pt = landmarks[idx];
            if (i === 0) ctx.moveTo(pt.x * canvas.width, pt.y * canvas.height);
            else ctx.lineTo(pt.x * canvas.width, pt.y * canvas.height);
        });
        ctx.stroke();

        ctx.beginPath();
        botLipIdx.forEach((idx, i) => {
            const pt = landmarks[idx];
            if (i === 0) ctx.moveTo(pt.x * canvas.width, pt.y * canvas.height);
            else ctx.lineTo(pt.x * canvas.width, pt.y * canvas.height);
        });
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
        ctx.fill();
    }

    function drawHair(landmarks) {
        const forehead = landmarks[10];
        const leftSide = landmarks[234];
        const rightSide = landmarks[454];

        const faceWidth = Math.abs(leftSide.x - rightSide.x) * canvas.width;
        const hairW = faceWidth * 3.0;
        const hairH = hairW * (hairImg.height / hairImg.width);

        const xPos = (forehead.x * canvas.width) - (hairW / 2);
        const yPos = (forehead.y * canvas.height) - (hairH / 3);

        ctx.drawImage(hairImg, xPos, yPos, hairW, hairH);
    }

    setup();
  </script>
</body>
</html>
